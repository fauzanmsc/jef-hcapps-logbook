<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JEF Dashboard Task</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        background: #0f0f0f;
        color: #fff;
        padding: 20px;
      }
      .cardx {
        background: #171717;
        border-radius: 25px;
        padding: 20px;
        margin-bottom: 15px;
        border: 1px solid #292929;
      }
      .profile {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .avatar {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f5c451, #d8a52c);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        color: black;
        font-weight: bold;
      }
      .taskCard {
        background: #1f1f1f;
        border-radius: 20px;
        padding: 20px;
        margin-top: 15px;
        border-left: 4px solid #f5c451;
      }
      .btn-jef {
        background: linear-gradient(135deg, #f5c451, #d8a52c);
        border: none;
        font-weight: bold;
      }
      .badgeDone {
        background: #25d583;
      }
      .badgePending {
        background: #666;
      }
      input,
      select,
      textarea {
        background: #262626 !important;
        color: white !important;
        border: 1px solid #444 !important;
      }
    </style>
  </head>
  <body>
    <div class="container" style="max-width: 900px">
      <div class="cardx">
        <div class="profile">
          <div class="avatar"><i class="bi bi-person"></i></div>
          <div>
            <h4 id="name">User</h4>
            <div id="position"></div>
            <div id="division"></div>
          </div>
        </div>
      </div>

      <div class="cardx">
        <div class="row g-2">
          <div class="col-md-4">
            <input type="date" id="filterDate" class="form-control" />
          </div>
          <div class="col-md-4">
            <select id="filterStatus" class="form-select">
              <option value="">Semua Status</option>
              <option value="DONE">DONE</option>
              <option value="PENDING">PENDING</option>
            </select>
          </div>
          <div class="col-md-4">
            <button class="btn btn-jef w-100" onclick="loadTasks()">
              Filter
            </button>
          </div>
        </div>
      </div>

      <div id="stats"></div>
      <div id="taskContainer"></div>
    </div>

    <script>
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwbpJQas3xphkwdMC-JF_vBmmkSzo24QH3UefteN1HAr7Up0mwNjON1QW5gUZNDNjlJVw/exec"; //ubah
      const user = localStorage.getItem("jef_dashboard_user");

      async function callAPI(payload) {
        const res = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: "data=" + encodeURIComponent(JSON.stringify(payload)),
        });
        return await res.json();
      }

      async function loadProfile() {
        let p = await callAPI({ action: "getUserProfile", username: user });
        document.getElementById("name").innerText = user;
        document.getElementById("position").innerHTML =
          "Jabatan : " + (p.position || "-");
        document.getElementById("division").innerHTML =
          "Divisi : " + (p.division || "-");
      }

      async function loadTasks() {
        Swal.fire({ title: "Loading...", didOpen: () => Swal.showLoading() });
        let tasks = await callAPI({
          action: "getDashboardTasks",
          username: user,
          date: filterDate.value,
        });
        Swal.close();

        let status = filterStatus.value;
        if (status) {
          tasks = tasks.filter((x) => x.status == status);
        }

        let done = tasks.filter((x) => x.status == "DONE").length;
        let pending = tasks.filter((x) => x.status != "DONE").length;

        document.getElementById("stats").innerHTML = `
<div class='cardx'>
<div class='row text-center'>
<div class='col'>📋<h4>${tasks.length}</h4>Total</div>
<div class='col'>✅<h4>${done}</h4>Done</div>
<div class='col'>⌛<h4>${pending}</h4>Pending</div>
</div></div>`;

        let html = "";

        for (let t of tasks) {
          html += `
<div class='taskCard'>
<div class='d-flex justify-content-between'>
<div>
<h5>${t.task}</h5>
<small>${t.target}</small>
</div>
<span class='badge ${t.status == "DONE" ? "badgeDone" : "badgePending"}'>${t.status}</span>
</div>

<div class='row mt-3'>
<div class='col-md-6'><input class='form-control start' placeholder='Jam Mulai'></div>
<div class='col-md-6'><input class='form-control end' placeholder='Jam Selesai'></div>
<div class='col-md-6 mt-2'><input class='form-control output' placeholder='Output'></div>
<div class='col-md-6 mt-2'><input class='form-control issue' placeholder='Kendala'></div>
</div>

<div class='mt-3 d-flex gap-2'>
<button class='btn btn-warning btn-sm' onclick='editTask(${t.row},"${t.task}","${t.target}")'><i class='bi bi-pencil'></i></button>
<button class='btn btn-danger btn-sm' onclick='deleteTask(${t.row})'><i class='bi bi-trash'></i></button>
<button class='btn btn-success btn-sm' onclick='saveDetail(${t.row},this)'><i class='bi bi-floppy'></i> Simpan</button>
</div>
</div>`;
        }

        document.getElementById("taskContainer").innerHTML = html;
      }

      async function saveDetail(row, btn) {
        let card = btn.closest(".taskCard");
        await callAPI({
          action: "updateDashboardTask",
          data: {
            row: row,
            startTime: card.querySelector(".start").value,
            endTime: card.querySelector(".end").value,
            output: card.querySelector(".output").value,
            issue: card.querySelector(".issue").value,
          },
        });
        Swal.fire("Berhasil", "Task diperbarui", "success");
      }

      async function editTask(row, task, target) {
        const p = await Swal.fire({
          title: "Edit Task",
          html: `<input id=t1 value='${task}' class='form-control'><br><input id=t2 value='${target}' class='form-control'>`,
          showCancelButton: true,
          preConfirm: () => ({ task: t1.value, target: t2.value }),
        });
        if (!p.value) return;
        await callAPI({
          action: "updateTask",
          data: { row: row, task: p.value.task, target: p.value.target },
        });
        loadTasks();
      }

      async function deleteTask(row) {
        let x = await Swal.fire({ title: "Hapus?", showCancelButton: true });
        if (!x.isConfirmed) return;
        await callAPI({ action: "deleteTask", row });
        loadTasks();
      }

      loadProfile();
      loadTasks();
    </script>
  </body>
</html>
