<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JEF Dashboard Task</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        background: #0f0f0f;
        color: #fff;
        padding: 20px;
      }
      .cardx {
        background: #171717;
        border-radius: 25px;
        padding: 20px;
        margin-bottom: 15px;
        border: 1px solid #292929;
      }
      .profile {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .avatar {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f5c451, #d8a52c);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        color: black;
        font-weight: bold;
      }
      .taskCard {
        background: #1f1f1f;
        border-radius: 20px;
        padding: 20px;
        margin-top: 15px;
        border-left: 4px solid #f5c451;
      }
      .btn-jef {
        background: linear-gradient(135deg, #f5c451, #d8a52c);
        border: none;
        font-weight: bold;
      }
      .badgeDone {
        background: #25d583;
      }
      .badgePending {
        background: #666;
      }
      input,
      select,
      textarea {
        background: #262626 !important;
        color: white !important;
        border: 1px solid #444 !important;
      }
    </style>
  </head>
  <body>
    <div class="container" style="max-width: 900px">
      <div class="cardx">
        <div class="profile">
          <div class="avatar"><i class="bi bi-person"></i></div>
          <div>
            <h4 id="name">User</h4>
            <div id="position"></div>
            <div id="division"></div>
          </div>
        </div>
      </div>

      <div class="cardx">
        <div class="row g-2">
          <div class="col-md-4">
            <input type="date" id="filterDate" class="form-control" />
          </div>
          <div class="col-md-4">
            <select id="filterStatus" class="form-select">
              <option value="">Semua Status</option>
              <option value="DONE">DONE</option>
              <option value="PENDING">PENDING</option>
            </select>
          </div>
          <div class="col-md-4">
            <button class="btn btn-jef w-100" onclick="loadTasks()">
              Filter
            </button>
          </div>
        </div>
      </div>

      <div id="stats"></div>
      <div id="taskContainer"></div>
    </div>

    <script src="script.js"></script>
    
  </body>
</html>
