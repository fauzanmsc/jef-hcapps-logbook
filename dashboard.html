<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <base target="_top" />
    <title>JEF Dashboard - Task Management</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/js/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JEF DASHBOARD" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/png/jef-icons.png" />
    <link rel="apple-touch-icon" href="/images/png/jef-icons.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#1a1a1a" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      .dashboard-wrapper {
        width: 100%;
        min-height: 100vh;
      }

      .dashboard-container {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        padding: 16px;
        padding-bottom: 120px;
      }

      .header-card {
        background: linear-gradient(135deg, rgba(245, 196, 81, 0.15) 0%, rgba(245, 196, 81, 0.05) 100%);
        border: 1px solid rgba(245, 196, 81, 0.2);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }

      .dashboard-header {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .dashboard-avatar {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: linear-gradient(145deg, #a87e00, #ffdcb0);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        color: white;
        font-weight: bold;
        box-shadow: 0 8px 25px rgba(245, 196, 81, 0.3);
        border: 3px solid #d6a131;
        overflow: hidden;
        position: relative;
      }

      .dashboard-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .dashboard-avatar .avatar-fallback {
        animation: avatarPulse 2s ease-in-out infinite;
      }

      @keyframes avatarPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }

      .dashboard-info {
        flex: 1;
      }

      .dashboard-info h3 {
        font-weight: 800;
        margin: 0 0 6px 0;
        background: linear-gradient(135deg, #f5c451, #ffd979);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-size: 1.4rem;
      }

      .dashboard-info small {
        display: block;
        color: #a0a0a0;
        font-size: 0.8rem;
        margin: 4px 0;
      }

      .filter-card {
        background: rgba(23, 23, 23, 0.95);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(245, 196, 81, 0.12);
        border-radius: 20px;
        padding: 18px;
        margin-bottom: 16px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      }

      .filter-title {
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: #f5c451;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .filter-section {
        display: grid;
        grid-template-columns: 1fr 1fr 50px;
        gap: 10px;
        margin-bottom: 10px;
      }

      .filter-section input {
        background: rgba(20, 20, 20, 0.8) !important;
        border: 1.5px solid rgba(245, 196, 81, 0.15) !important;
        border-radius: 12px !important;
        padding: 12px !important;
        color: white !important;
        font-size: 0.9rem !important;
        transition: all 0.3s ease;
      }

      .filter-section input:focus {
        border-color: #f5c451 !important;
        box-shadow: 0 0 0 3px rgba(245, 196, 81, 0.1) !important;
        background: rgba(20, 20, 20, 0.95) !important;
      }

      .filter-section select {
        background: linear-gradient(135deg, rgba(20, 20, 20, 0.9) 0%, rgba(25, 25, 25, 0.9) 100%) !important;
        border: 1.5px solid rgba(245, 196, 81, 0.2) !important;
        border-radius: 12px !important;
        padding: 12px 12px !important;
        color: #f5c451 !important;
        font-size: 0.9rem !important;
        font-weight: 600 !important;
        transition: all 0.3s ease;
        appearance: none !important;
        cursor: pointer !important;
        background-image: url('data:image/svg+xml;utf8,<svg fill="%23f5c451" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>') !important;
        background-repeat: no-repeat !important;
        background-position: right 8px center !important;
        background-size: 20px !important;
        padding-right: 36px !important;
      }

      .filter-section select:focus {
        border-color: #f5c451 !important;
        box-shadow: 0 0 0 3px rgba(245, 196, 81, 0.15), inset 0 0 0 1px rgba(245, 196, 81, 0.1) !important;
        background-image: url('data:image/svg+xml;utf8,<svg fill="%23ffd979" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>') !important;
      }

      .filter-section select option {
        background: #1a1a1a !important;
        color: #f5c451 !important;
        font-weight: 600 !important;
        padding: 8px !important;
      }

      .filter-section select option:checked {
        background: linear-gradient(#f5c451, #f5c451) !important;
        background-color: #f5c451 !important;
        color: #111 !important;
      }

      .filter-btn {
        background: linear-gradient(135deg, #f5c451 0%, #d8a52c 100%) !important;
        color: #111 !important;
        font-weight: 700 !important;
        border: none !important;
        border-radius: 12px !important;
        padding: 12px !important;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
      }

      .filter-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(245, 196, 81, 0.3) !important;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }

      .stat-card {
        background: linear-gradient(135deg, #f5c451 0%, #d8a52c 100%);
        border-radius: 16px;
        padding: 16px;
        text-align: center;
        color: #111;
        font-weight: 700;
        box-shadow: 0 6px 18px rgba(245, 196, 81, 0.25);
        transition: all 0.3s ease;
      }

      .stat-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 28px rgba(245, 196, 81, 0.35);
      }

      .stat-card h5 {
        font-size: 1.9rem;
        margin: 6px 0 4px;
        font-weight: 800;
      }

      .stat-card small {
        display: block;
        font-size: 0.75rem;
        opacity: 0.9;
        font-weight: 600;
      }

      .stat-card i {
        font-size: 1.2rem;
        display: block;
        margin-bottom: 6px;
      }

      .task-card {
        background: rgba(23, 23, 23, 0.95);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(245, 196, 81, 0.12);
        border-radius: 18px;
        padding: 18px;
        margin-bottom: 14px;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      }

      .task-card:hover {
        transform: translateY(-6px);
        border-color: rgba(245, 196, 81, 0.25);
        box-shadow: 0 12px 30px rgba(245, 196, 81, 0.15);
      }

      .task-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 14px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(245, 196, 81, 0.08);
      }

      .task-info {
        flex: 1;
      }

      .task-title {
        font-weight: 800;
        font-size: 1rem;
        margin-bottom: 4px;
        color: #f5f5f5;
      }

      .task-target {
        font-size: 0.8rem;
        color: #a0a0a0;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .status-badge {
        padding: 8px 14px;
        border-radius: 24px;
        font-size: 0.75rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 6px;
        border: none;
        background: none;
      }

      .status-badge.done {
        background: linear-gradient(135deg, #25d583, #1ea373);
        color: white;
        box-shadow: 0 4px 12px rgba(37, 213, 131, 0.25);
      }

      .status-badge.done:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(37, 213, 131, 0.35);
      }

      .status-badge.pending {
        background: rgba(100, 100, 100, 0.8);
        color: white;
        box-shadow: 0 4px 12px rgba(100, 100, 100, 0.25);
      }

      .status-badge.pending:hover {
        transform: translateY(-2px);
        background: rgba(120, 120, 120, 0.9);
        box-shadow: 0 6px 16px rgba(100, 100, 100, 0.35);
      }

      .task-inputs {
        display: grid;
        gap: 14px;
        margin-top: 14px;
      }

      .task-input-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .task-input-group {
        display: flex;
        flex-direction: column;
      }

      .task-input-group label {
        font-size: 0.8rem;
        font-weight: 600;
        color: #a0a0a0;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .task-input-group label i {
        font-size: 0.75rem;
        color: #f5c451;
      }

      .task-input-group input {
        background: rgba(20, 20, 20, 0.8) !important;
        border: 1.5px solid rgba(245, 196, 81, 0.12) !important;
        border-radius: 10px !important;
        padding: 10px 12px !important;
        color: white !important;
        font-size: 0.9rem !important;
        transition: all 0.3s ease;
      }

      .task-input-group input:focus {
        border-color: #f5c451 !important;
        box-shadow: 0 0 0 3px rgba(245, 196, 81, 0.1) !important;
        background: rgba(20, 20, 20, 0.95) !important;
      }

      .task-full-width {
        grid-column: 1 / -1;
      }

      .task-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid rgba(245, 196, 81, 0.08);
      }

      .task-actions button {
        padding: 10px 12px;
        font-size: 0.8rem;
        border-radius: 10px;
        border: none;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .btn-edit {
        background: linear-gradient(135deg, #14bb79, #c5d312);
        color: white;
        box-shadow: 0 4px 12px rgba(48, 133, 214, 0.2);
      }

      .btn-edit:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(48, 133, 214, 0.3);
      }

      .btn-delete {
        background: linear-gradient(135deg, #e74c3c, #c0392b);
        color: white;
        box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2);
      }

      .btn-delete:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(231, 76, 60, 0.3);
      }



      .footer-actions {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 512px;
        background: linear-gradient(180deg, rgba(15, 15, 15, 0) 0%, rgba(15, 15, 15, 0.95) 30%, rgba(15, 15, 15, 0.99) 100%);
        backdrop-filter: blur(8px);
        padding: 20px 16px 20px;
        display: flex;
        gap: 10px;
        justify-content: center;
        z-index: 1000;
      }

      .footer-actions button {
        padding: 12px 16px;
        border-radius: 12px;
        border: none;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .btn-primary-jef {
        background: linear-gradient(135deg, #f5c451, #d8a52c);
        color: #111;
        flex: 1;
        box-shadow: 0 6px 18px rgba(245, 196, 81, 0.3);
        justify-content: center;
        text-align: center;
      }

      .btn-primary-jef:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(245, 196, 81, 0.4);
      }

      .btn-secondary-jef {
        background: rgba(255, 255, 255, 0.08);
        border: 1.5px solid rgba(245, 196, 81, 0.3);
        color: #f5c451;
      }

      .btn-secondary-jef:hover {
        background: rgba(245, 196, 81, 0.1);
        transform: translateY(-2px);
      }

      .refresh-btn {
        background: rgba(255, 255, 255, 0.08);
        border: 1.5px solid rgba(255, 255, 255, 0.15);
        color: white;
      }

      .refresh-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        transform: translateY(-2px);
      }

      /* Responsive Design */
      @media (max-width: 480px) {
        .dashboard-container {
          padding: 12px;
          padding-bottom: 110px;
        }

        .header-card {
          padding: 16px;
          margin-bottom: 12px;
        }

        .dashboard-avatar {
          width: 80px;
          height: 80px;
        }

        .dashboard-info h3 {
          font-size: 1.2rem;
        }

        .task-title {
          font-size: 0.95rem;
        }

        .footer-actions {
          padding: 16px 12px 16px;
          gap: 8px;
        }

        .footer-actions button {
          font-size: 0.8rem;
          padding: 10px 12px;
        }
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #8d8d8d;
      }

      .empty-state i {
        font-size: 3rem;
        color: #f5c451;
        margin-bottom: 16px;
        opacity: 0.6;
      }

      .swal2-popup {
        background: rgba(20, 20, 20, 0.98) !important;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(245, 196, 81, 0.15) !important;
        border-radius: 20px !important;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4) !important;
      }

      .swal2-title {
        color: #f5c451 !important;
        font-weight: 800 !important;
      }

      .swal2-html-container {
        color: #e0e0e0 !important;
      }

      .swal2-styled.swal2-confirm {
        background: linear-gradient(135deg, #f5c451, #d8a52c) !important;
        color: #111 !important;
        font-weight: 700 !important;
        box-shadow: 0 6px 18px rgba(245, 196, 81, 0.3) !important;
      }

      .swal2-styled.swal2-cancel {
        background: rgba(255, 255, 255, 0.08) !important;
        border: 1px solid rgba(255, 255, 255, 0.15) !important;
        color: white !important;
      }

      .form-control.form-control-swal {
        background: rgba(20, 20, 20, 0.8) !important;
        border: 1.5px solid rgba(245, 196, 81, 0.15) !important;
        color: white !important;
        border-radius: 12px !important;
        padding: 12px !important;
        margin: 6px 0 !important;
      }

      .form-control.form-control-swal:focus {
        border-color: #f5c451 !important;
        box-shadow: 0 0 0 3px rgba(245, 196, 81, 0.1) !important;
      }
    </style>
  </head>
  <body>
    <!-- Page Loader -->
    <div id="dashboardLoader" class="initial-loader">
      <div class="loader-content text-center">
        <div class="loader-ring"></div>
      </div>
    </div>

    <div class="dashboard-wrapper">
      <div class="dashboard-container">
        <!-- Header dengan Profile -->
        <div class="header-card">
          <div class="dashboard-header">
            <div class="dashboard-avatar">
              <img id="avatarImg" src="/images/gif/animate.gif" alt="Profile"/>
            </div>
            <div class="dashboard-info">
              <h3 id="name">User</h3>
              <small id="position">
                <i class="bi bi-briefcase"></i> Jabatan: -
              </small>
              <small id="division">
                <i class="bi bi-diagram-3"></i> Divisi: -
              </small>
            </div>
          </div>
        </div>

        <!-- Filter Section -->
        <div class="filter-card">
          <div class="filter-title">
            <i class="bi bi-funnel"></i> Filter Task
          </div>
          <div class="filter-section">
            <input type="date" id="filterDate" class="form-control" />
            <select id="filterStatus" class="form-select" title="Pilih status task">
              <option value="">Semua Status</option>
              <option value="DONE">✓ DONE - Selesai</option>
              <option value="PENDING">⏳ PENDING - Menunggu</option>
            </select>
            <button class="btn filter-btn" onclick="loadDashboardTasks()" title="Filter">
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>

        <!-- Stats -->
        <div id="stats"></div>

        <!-- Task List -->
        <div id="taskContainer"></div>

   

      </div>


          <!-- Footer Actions -->
    
    </div>

    <div class="footer-wrapper">
         <div class="footer-actions">
      <button class="btn refresh-btn" title="Refresh tasks" onclick="loadDashboardTasks()">
        <i class="bi bi-arrow-clockwise"></i> Refresh
      </button>
      <button class="btn btn-primary-jef" title="Save all changes" onclick="saveAllChanges()">
        <i class="bi bi-cloud-check"></i> Simpan <span id="pendingCount">(0)</span>
      </button>
      <button class="btn btn-secondary-jef" title="Back to home" onclick="backToHome()">
        <i class="bi bi-house-fill"></i> Beranda
      </button>
    </div>
</div>

    <script>
      function hideLoader() {
        const loader = document.getElementById("dashboardLoader");
        loader.classList.add("hidden");
      }

      function showLoader() {
        const loader = document.getElementById("dashboardLoader");
        loader.classList.remove("hidden");
      }

      function backToHome() {
        window.location.href = "/";
      }

      function toggleStatus(row) {
        let task = dashboardTasks.find((x) => x.row == row);
        if (!task) return;

        const newStatus = task.status === "DONE" ? "PENDING" : "DONE";
        task.status = newStatus;

        const updateData = {
          row: row,
          status: newStatus,
        };

        const exist = pendingChanges.update.find((x) => x.row == row);
        if (exist) {
          Object.assign(exist, updateData);
        } else {
          pendingChanges.update.push(updateData);
        }

        renderDashboard();
      }

      window.addEventListener("DOMContentLoaded", () => {
        showLoader();
        
        const dateInput = document.getElementById("filterDate");
        const today = new Date().toISOString().split("T")[0];
        dateInput.value = today;

        loadDashboardProfile();
        loadDashboardTasks();

        setTimeout(() => {
          hideLoader();
        }, 500);
      });

      const originalRenderDashboard = renderDashboard;
      window.renderDashboard = function () {
        let tasks = [...dashboardTasks];
        const status = document.getElementById("filterStatus").value;

        if (status) {
          tasks = tasks.filter((x) => x.status === status);
        }

        let done = tasks.filter((x) => x.status === "DONE").length;
        let pending = tasks.filter((x) => x.status !== "DONE").length;

        document.getElementById("stats").innerHTML = `
          <div class="stats-grid mb-4">
            <div class="stat-card">
              <i class="bi bi-list-check"></i>
              <h5>${tasks.length}</h5>
              <small>Total</small>
            </div>
            <div class="stat-card">
              <i class="bi bi-check-circle"></i>
              <h5>${done}</h5>
              <small>Selesai</small>
            </div>
            <div class="stat-card">
              <i class="bi bi-hourglass-split"></i>
              <h5>${pending}</h5>
              <small>Pending</small>
            </div>
          </div>
        `;

        let html = "";
        if (tasks.length === 0) {
          html = `
            <div class="empty-state">
              <i class="bi bi-inbox"></i>
              <p>Tidak ada task untuk hari ini</p>
            </div>
          `;
        } else {
          tasks.forEach((t) => {
            html += `
              <div class="task-card" data-row="${t.row}">
                <div class="task-header">
                  <div class="task-info">
                    <div class="task-title">${t.task}</div>
                    <div class="task-target">
                      <i class="bi bi-target"></i> Target: ${t.target}
                    </div>
                  </div>
                  <button class="status-badge ${t.status === "DONE" ? "done" : "pending"}" onclick="toggleStatus(${t.row})" title="Click to toggle">
                    <i class="bi ${t.status === "DONE" ? "bi-check-circle-fill" : "bi-clock-history"}"></i>
                    ${t.status}
                  </button>
                </div>

                <div class="task-inputs">
                  <div class="task-input-row">
                    <div class="task-input-group">
                      <label><i class="bi bi-play-circle"></i> Jam Mulai</label>
                      <input type="time" class="form-control start" min="00:00" max="23:59" value="${t.startTime || ""}" />
                    </div>
                    <div class="task-input-group">
                      <label><i class="bi bi-stop-circle"></i> Jam Selesai</label>
                      <input type="time" class="form-control end" min="00:00" max="23:59" value="${t.endTime || ""}" />
                    </div>
                  </div>

                  <div class="task-input-group task-full-width">
                    <label><i class="bi bi-lightbulb"></i> Output Hasil</label>
                    <input type="text" class="form-control output" placeholder="Hasil kerja hari ini..." value="${t.output || ""}" />
                  </div>

                  <div class="task-input-group task-full-width">
                    <label><i class="bi bi-exclamation-circle"></i> Kendala (Opsional)</label>
                    <input type="text" class="form-control issue" placeholder="Ada hambatan yang dihadapi?" value="${t.issue || ""}" />
                  </div>
                </div>

                <div class="task-actions">
                  <button class="btn-edit" onclick="editTask(${t.row})" title="Edit task">
                    <i class="bi bi-pencil-square"></i> Edit
                  </button>
                  <button class="btn-delete" onclick="deleteTask(${t.row})" title="Delete task">
                    <i class="bi bi-trash3"></i> Hapus
                  </button>
                </div>
              </div>
            `;
          });
        }

        document.getElementById("taskContainer").innerHTML = html;
        document.getElementById("pendingCount").textContent = `(${totalPending()})`;
      };

      // Override editTask untuk styling yang lebih baik
      const originalEditTask = editTask;
      window.editTask = async function(row) {
        let task = dashboardTasks.find((x) => x.row == row);
        if (!task) return;

        const p = await Swal.fire({
          title: "Edit Task",
          icon: 'edit',
          html: `
            <div style="text-align: left;">
              <label class="small fw-semibold mb-2 d-block text-muted" style="color: #a0a0a0 !important;">
                <i class="bi bi-type"></i> Nama Task
              </label>
              <input
                id="t1"
                class="form-control form-control-swal"
                value="${task.task}"
              />

              <label class="small fw-semibold mb-2 d-block text-muted" style="margin-top: 12px; color: #a0a0a0 !important;">
                <i class="bi bi-crosshair"></i> Target
              </label>
              <input
                id="t2"
                class="form-control form-control-swal"
                value="${task.target}"
              />
            </div>
          `,
          showCancelButton: true,
          confirmButtonText: 'Simpan Perubahan',
          cancelButtonText: 'Batal',
          didOpen: () => {
            document.getElementById('t1').focus();
          },
          preConfirm: () => ({
            task: document.getElementById("t1").value,
            target: document.getElementById("t2").value,
          }),
        });

        if (!p.value) return;

        task.task = p.value.task;
        task.target = p.value.target;

        const updateData = {
          row: row,
          task: task.task,
          target: task.target,
        };

        const exist = pendingChanges.update.find((x) => x.row == row);
        if (exist) {
          Object.assign(exist, updateData);
        } else {
          pendingChanges.update.push(updateData);
        }

        renderDashboard();
      };
    </script>
  </body>
</html>
