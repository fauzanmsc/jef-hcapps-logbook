<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JEF Dashboard Task</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        background: #0f0f0f;
        color: white;
        padding: 20px;
      }
      .cardx {
        background: #171717;
        padding: 20px;
        border-radius: 20px;
        margin-bottom: 15px;
        border: 1px solid #333;
      }
      .btn-jef {
        background: linear-gradient(135deg, #f5c451, #d8a52c);
        font-weight: bold;
        border: none;
      }
      .task {
        background: #222;
        padding: 15px;
        border-radius: 15px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container" style="max-width: 700px">
      <div class="cardx">
        <h3>📊 Dashboard Task</h3>
        <div id="username"></div>
      </div>

      <div class="cardx">
        <div class="row">
          <div class="col-8">
            <input id="filterDate" type="date" class="form-control" />
          </div>
          <div class="col-4">
            <button class="btn btn-jef w-100" onclick="loadTasks()">
              Filter
            </button>
          </div>
        </div>
      </div>

      <div class="cardx">
        <button class="btn btn-jef w-100" onclick="addTaskModal()">
          + Tambah Task
        </button>
      </div>

      <div id="stats"></div>
      <div id="taskContainer"></div>

      <div class="mt-3">
        <button
          class="btn btn-secondary w-100"
          onclick="window.location = './index.html'"
        >
          Kembali
        </button>
      </div>
    </div>

    <script>
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwbpJQas3xphkwdMC-JF_vBmmkSzo24QH3UefteN1HAr7Up0mwNjON1QW5gUZNDNjlJVw/exec"; //Ubah
      const user = localStorage.getItem("jef_dashboard_user");
      document.getElementById("username").innerHTML = "User : " + user;

      async function callAPI(payload) {
        const res = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: "data=" + encodeURIComponent(JSON.stringify(payload)),
        });
        return await res.json();
      }

      async function loadTasks() {
        Swal.fire({ title: "Loading...", didOpen: () => Swal.showLoading() });
        const date = document.getElementById("filterDate").value;
        const data = await callAPI({
          action: "getDashboardTasks",
          username: user,
          date,
        });
        Swal.close();

        let done = 0;
        let pending = 0;
        let html = "";

        data.forEach((x) => {
          if (x.status === "DONE") done++;
          else pending++;
          html += `
<div class='task'>
<div class='d-flex justify-content-between'>
<b>${x.task}</b>
<span>${x.status}</span>
</div>
<small>${x.target}</small>
<div class='mt-3 d-flex gap-2'>
<button class='btn btn-warning btn-sm' onclick='editTask(${x.row},"${x.task}","${x.target}")'>Edit</button>
<button class='btn btn-danger btn-sm' onclick='deleteTask(${x.row})'>Delete</button>
</div>
</div>`;
        });

        document.getElementById("stats").innerHTML = `
<div class='cardx'>
Total:${data.length}<br>
Done:${done}<br>
Pending:${pending}
</div>`;

        document.getElementById("taskContainer").innerHTML = html;
      }

      async function addTaskModal() {
        const p = await Swal.fire({
          title: "Tambah Task",
          html: `<input id=t1 class=form-control placeholder='Task'><br><input id=t2 class=form-control placeholder='Target'>`,
          showCancelButton: true,
          preConfirm: () => ({ task: t1.value, target: t2.value }),
        });
        if (!p.value) return;

        await callAPI({
          action: "addTaskDashboard",
          data: {
            date: new Date().toISOString().split("T")[0],
            username: user,
            position: "-",
            division: "-",
            task: p.value.task,
            target: p.value.target,
          },
        });
        loadTasks();
      }

      async function editTask(row, task, target) {
        const p = await Swal.fire({
          title: "Edit Task",
          html: `<input id=t1 value='${task}' class=form-control><br><input id=t2 value='${target}' class=form-control>`,
          showCancelButton: true,
          preConfirm: () => ({ task: t1.value, target: t2.value }),
        });
        if (!p.value) return;

        await callAPI({
          action: "updateTask",
          data: { row, task: p.value.task, target: p.value.target },
        });
        loadTasks();
      }

      async function deleteTask(row) {
        const x = await Swal.fire({ title: "Hapus?", showCancelButton: true });
        if (!x.isConfirmed) return;
        await callAPI({ action: "deleteTask", row });
        loadTasks();
      }

      loadTasks();
    </script>
  </body>
</html>
