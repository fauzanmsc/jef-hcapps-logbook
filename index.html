  <style>
  :root {
    --bg-main: #0f0f0f;
    --bg-card: #171717;
    --bg-soft: #1f1f1f;
    --gold: #f5c451;
    --gold-soft: #ffd979;
    --text: #ffffff;
    --muted: #9ca3af;
    --card-radius: 24px;
  }

  body {
    background:
      radial-gradient(circle at top right, rgba(245,196,81,0.12), transparent 30%),
      radial-gradient(circle at bottom left, rgba(245,196,81,0.08), transparent 25%),
      var(--bg-main);
    font-family: 'Plus Jakarta Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px 20px 60px;
    color: var(--text);
  }

  .app-shell {
    width: 100%;
    max-width: 480px;
    animation: fadeIn 0.6s ease;
  }

  .page { display: none; }
  .active { display: block; }

  .bento-card {
    background: rgba(23,23,23,0.95);
    backdrop-filter: blur(14px);
    border-radius: var(--card-radius);
    padding: 25px;
    box-shadow:
      0 10px 40px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.04);
    border: 1px solid rgba(245,196,81,0.15);
    margin-bottom: 20px;
  }

  .bento-header {
    background:
      linear-gradient(135deg, #181818, #0f0f0f);
    color: white;
    border-radius: var(--card-radius);
    padding: 35px 30px;
    margin-bottom: 20px;
    text-align: center;
    border: 1px solid rgba(245,196,81,0.2);
    box-shadow:
      0 10px 30px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .bento-header img {
    filter: drop-shadow(0 0 15px rgba(245,196,81,0.4));
  }

  .btn-jef {
    background: linear-gradient(135deg, #f5c451, #d8a52c);
    color: #111 !important;
    border-radius: 18px;
    padding: 14px;
    border: none;
    font-weight: 800;
    width: 100%;
    transition: all 0.25s ease;
    letter-spacing: 0.3px;
    box-shadow:
      0 8px 20px rgba(245,196,81,0.25);
  }

  .btn-jef:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow:
      0 12px 30px rgba(245,196,81,0.35);
  }

  .btn-success {
    background: linear-gradient(135deg, #f5c451, #d8a52c);
    border: none;
    color: #111 !important;
    font-weight: 800;
    box-shadow:
      0 8px 20px rgba(245,196,81,0.25);
  }

  .btn-success:hover {
    transform: translateY(-2px);
  }

  .menu-item {
    background: linear-gradient(145deg, #a87e00, #ffdcb0);
    border-radius: 22px;
    padding: 25px;
    text-align: center;
    transition: 0.3s;
    cursor: pointer;
    border: 1px solid rgba(245,196,81,0.12);
    height: 100%;
    color: white;
    box-shadow:
      0 6px 20px rgba(0,0,0,0.35);
  }

  .menu-item:hover {
    border-color: var(--gold);
    transform: translateY(-5px);
    box-shadow:
      0 12px 30px rgba(245,196,81,0.18);
  }

  .menu-icon {
    font-size: 2.5rem;
    margin-bottom: 10px;
    display: block;
    filter: drop-shadow(0 0 10px rgba(245,196,81,0.3));
  }

    button.btn.btn-sm.btn-outline-dark.border-0.fw-bold.mt-2 {
      color: #f5ead0;
    font-weight: 400 !important;
    background: #202020;
    border-radius: 8px;
    padding: 5px 10px;
    }

     button.btn.btn-sm.btn-outline-dark.border-0.fw-bold.mt-2:hover {
        color: #e8bb51;
    background: #272727;
    }

  .form-control,
  .form-select {
    border-radius: 14px;
    padding: 13px;
    border: 1px solid rgba(245,196,81,0.12);
    background: #eaeaea;
    color: #404040;
  }

  .form-control::placeholder {
    color: #7a7a7a;
  }

  .form-control:focus {
    box-shadow:
      0 0 0 4px rgba(245,196,81,0.15);
    border-color: var(--gold);
    background: #333333;
    color: white;
  }

  .bg-light {
    background: #202020 !important;
    color: white !important;
  }

  .text-primary {
    color: var(--gold-soft) !important;
  }

  .text-muted {
    color: #8d8d8d !important;
  }

  .border-top,
  .border-bottom {
    border-color: rgba(255,255,255,0.06) !important;
  }

  .bg-primary {
    background: linear-gradient(135deg, #f5c451, #d8a52c) !important;
    color: #111 !important;
  }

  .btn-link {
    color: #c9c9c9 !important;
  }

  .btn-link:hover {
    color: var(--gold) !important;
  }

  .input-group {
    background: #1d1d1d;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(245,196,81,0.08);
  }

.password-wrapper {
  position: relative;
}

.toggle-password {
  position: absolute;
  top: 50%;
  right: 14px;
  transform: translateY(-50%);
  background: transparent;
  border: none;
  color: #a7a7a7;
  font-size: 18px;
  cursor: pointer;
  padding: 0;
  transition: 0.2s ease;
}

.toggle-password:hover {
  transform: translateY(-50%) scale(1.1);
  color: #777777;
}

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

/* Chrome Autofill Dark Mode Fix */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
textarea:-webkit-autofill,
select:-webkit-autofill {
  -webkit-text-fill-color: #ffffff !important;
  caret-color: #ffffff;
  
  -webkit-box-shadow: 0 0 0px 1000px #1c1c1c inset !important;
  box-shadow: 0 0 0px 1000px #282828 inset !important;

  border: 1px solid rgba(245,196,81,0.12) !important;

  transition: background-color 9999s ease-in-out 0s;
}


.app-footer {
  position: fixed;
  bottom: 0;
  left: 0;

  width: 100%;

  text-align: center;

  padding: 14px 0;

  color: #7d7d7d;
  font-size: 13px;
  letter-spacing: 0.3px;

  background: transparent;

  z-index: 999;
}

.app-footer span {
  color: #f5c451;
  font-weight: 700;
  text-shadow: 0 0 12px rgba(245,196,81,0.35);
}

.app-footer small {
  opacity: 0.85;
}
    
</style>
</head>
<body>

<div class="app-shell">
  
  <div id="pageLogin" class="page active">
    <div class="bento-header shadow-lg text-center">
  <img 
    src="/jef-logomark.png" 
    alt="JEF Logo"
    class="mb-2"
    style="max-width: 80px; height: auto;"
  >

  <h3 class="fw-bold mb-0">JEF WEB APPS</h3>
  <small class="opacity-50">Daily Log Book v1.0</small>
</div>
    <div class="bento-card">
      <div class="mb-3">
        <label class="small fw-bold text-muted mb-2 d-block">Masukkan Username</label>
        <input type="text" id="u" class="form-control" placeholder="Username">
      </div>

<div class="mb-4">
  <label class="small fw-bold text-muted mb-2 d-block">
    Masukkan Password
  </label>

  <div class="password-wrapper">
    <input 
      type="password" 
      id="p" 
      class="form-control pe-5" 
      placeholder="••••••••"
    >

<button type="button" class="toggle-password" onclick="togglePassword()">
  <i class="bi bi-eye-fill"></i>
</button>
  </div>
</div>
      
      <button class="btn btn-jef shadow" onclick="doLogin()">Masuk</button>
    </div>
  </div>

  <div id="pageMenu" class="page">
    <div class="mb-4 text-center">
      <h5 class="fw-bold">Selamat Datang,</h5>
      <h4 class="text-primary fw-bold" id="userLabel">User</h4>
    </div>
    <div class="row g-3">
      <div class="col-6">
        <div class="menu-item shadow-sm" onclick="showPlan()">
          <span class="menu-icon">✍️</span>
          <span class="small fw-bold text-dark">Buat Log Book</span>
        </div>
      </div>
      <div class="col-6">
        <div class="menu-item shadow-sm" onclick="showReport()">
          <span class="menu-icon">📊</span>
          <span class="small fw-bold text-dark">Lengkapi Report</span>
        </div>
      </div>
    </div>
    <div class="text-center mt-5">
      <button class="btn btn-link text-danger text-decoration-none small" onclick="location.reload()">Keluar</button>
    </div>
  </div>

  <div id="pagePlan" class="page">
    <div class="bento-card">
      <h6 class="fw-bold mb-4 text-center">
        Buat Daftar Log Book Hari Ini
      </h6>
      
      <div class="d-flex justify-content-between align-items-center mb-4 px-1">
        <div class="small text-muted">
          <i class="bi bi-calendar-event me-1"></i>
          <span id="currentDate"></span>
        </div>
      
        <div class="small text-muted">
          <i class="bi bi-clock me-1"></i>
          <span id="liveClock"></span>
        </div>
      </div>
      
      <div class="row g-2 mb-4">
        <div class="col-12"><label class="small fw-semibold mb-2">Nama Karyawan</label><input type="text" id="disName" class="form-control bg-light mb-2" readonly></div>
        <div class="col-6"><label class="small fw-semibold mb-2">Jabatan / Posisi</label><input type="text" id="disPos" class="form-control bg-light" readonly></div>
        <div class="col-6"><label class="small fw-semibold mb-2">Departemen / Divisi</label><input type="text" id="disDiv" class="form-control bg-light" readonly></div>
        <div class="col-12 mt-2"><label class="small fw-semibold mb-2">Kamu Datang Jam Berapa Hari Ini ?</label><input type="time" id="clockIn" class="form-control"></div>
      </div>
      
<div id="planContainer">

  <!-- Default Field (Tidak bisa dihapus) -->
  <div class="row g-2 mb-2 task-row">
    
    <div class="col-5">
      <input 
        type="text" 
        class="form-control tn shadow-sm" 
        placeholder="Isi task / activity"
      >
    </div>

    <div class="col-5">
      <input 
        type="text" 
        class="form-control tt shadow-sm" 
        placeholder="Isi target dari task"
      >
    </div>

    <div class="col-2">
      <button 
        type="button"
        class="btn btn-dark w-100 h-100"
        disabled
      >
        <i class="bi bi-dash-lg"></i>
      </button>
    </div>

  </div>

</div>
      
      <button class="btn btn-sm btn-outline-dark border-0 fw-bold mt-2" onclick="addPlanField()">+ Tambahkan Task</button>
      <button class="btn btn-jef mt-4" onclick="submitPlan()">Buat Log Book</button>
      <button class="btn btn-link w-100 text-muted btn-sm mt-2" onclick="nav('pageMenu')">Kembali ke Menu</button>
    </div>
  </div>

  <div id="pageReport" class="page">
    <div class="bento-card p-0 overflow-hidden">
      <div class="p-4 border-bottom bg-primary text-white">
        <h6 class="mb-0 fw-bold">Progress Report</h6>
      </div>
      <div class="p-4" style="max-height: 450px; overflow-y: auto;">
        <div id="reportContainer"></div>
        <textarea id="genNote" class="form-control mt-3" placeholder="Catatan tambahan..."></textarea>
      </div>
      <div class="p-4 border-top bg-light">
        <button class="btn btn-jef w-100 fw-bold p-3 rounded-4" onclick="finalReport()">
  Kirim Report
</button>
        <button class="btn btn-link w-100 text-muted btn-sm mt-2" onclick="nav('pageMenu')">Batalkan</button>
      </div>
    </div>
  </div>

</div>

<footer class="app-footer">
  <small>
   Copyright © 2026 JEF GROUP | <span>Human Capital</span>
  </small>
</footer>


  
<!-- Bagian HTML & CSS tetap sama seperti milik Anda -->

<script>
  // GANTI DENGAN URL WEB APP ANDA DARI GOOGLE DEPLOYMENT
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwt-H0dKaoaKnItBSuyKw44sLGJNxUxNenFEhlJYPju1U8o77PmPZwRcjCsdgfQCkQjEQ/exec";
  let user = "";

  // Fungsi helper untuk hit API
  async function callAPI(payload) {
    const response = await fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    return await response.json();
  }

  function nav(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function loader(text = 'Loading...') {
    Swal.fire({ title: text, allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  }

  async function doLogin() {
    const u = document.getElementById('u').value;
    const p = document.getElementById('p').value;
    if(!u || !p) return Swal.fire('Oops!', 'Lengkapi kredensial login terlebih dahulu.', 'warning');
    
    loader('Proses Autentifikasi...');
    const res = await callAPI({ action: 'checkLogin', u, p });
    Swal.close();
    if(res.success) { 
      user = res.name; 
      document.getElementById('userLabel').innerText = user; 
      nav('pageMenu'); 
    } else { 
      Swal.fire('Login Gagal', 'Username atau password yang dimasukkan salah.', 'error');
    }
  }

  async function showPlan() {
    loader('Memuat logbook...');
    const p = await callAPI({ action: 'getUserProfile', username: user });
    Swal.close();
    document.getElementById('disName').value = user;
    document.getElementById('disPos').value = p.position;
    document.getElementById('disDiv').value = p.division;
    document.getElementById('clockIn').value = new Date().toTimeString().slice(0,5);
    nav('pagePlan');
  }

function addPlanField() {
  const html = `
    <div class="row g-2 mb-2 task-row animate__animated animate__fadeInUp">
      
      <div class="col-5">
        <input 
          type="text" 
          class="form-control tn shadow-sm" 
          placeholder="Isi task / activity"
        >
      </div>

      <div class="col-5">
        <input 
          type="text" 
          class="form-control tt shadow-sm" 
          placeholder="Isi target dari task"
        >
      </div>

      <div class="col-2">
        <button 
          type="button"
          class="btn btn-outline-danger w-100 h-100"
          onclick="removeTask(this)"
        >
          <i class="bi bi-trash3-fill"></i>
        </button>
      </div>

    </div>
  `;

  document
    .getElementById('planContainer')
    .insertAdjacentHTML('beforeend', html);
}

  async function submitPlan() {
    let tasks = [];
    document.querySelectorAll('.tn').forEach((el, i) => {
      if(el.value) tasks.push({ name: el.value, target: document.querySelectorAll('.tt')[i].value });
    });
    if(tasks.length === 0) return Swal.fire('Oops!', 'Setidaknya harus ada 1 tugas.', 'warning');
    
    loader('Sedang menyimpan task...');
    const data = {
      name: user, position: document.getElementById('disPos').value, division: document.getElementById('disDiv').value,
      clockIn: document.getElementById('clockIn').value, date: new Date().toLocaleDateString('sv-SE'),
      tasks: JSON.stringify(tasks)
    };
    const res = await callAPI({ action: 'savePlan', data });
    Swal.fire('Success', res.message, 'success'); 
    nav('pageMenu');
  }

  async function showReport() {
    loader('Sedang menyinkronkan data...');
    const tasks = await callAPI({ action: 'getActiveTasks', username: user });
    Swal.close();
    if(tasks.length === 0) return Swal.fire('Info', 'Tidak ada task aktif untuk hari ini.', 'info');
    let h = '';
    tasks.forEach(t => {
      h += `<div class="bento-card mb-3 bg-light" data-row="${t.row}" style="padding: 15px; border-radius: 16px;">
        <p class="mb-2 fw-bold text-dark small">${t.task}</p>
        <div class="row g-2">
          <div class="col-6"><input type="time" class="form-control form-control-sm r-start"></div>
          <div class="col-6"><input type="time" class="form-control form-control-sm r-end"></div>
          <div class="col-12"><input type="text" class="form-control form-control-sm r-out" placeholder="Output Result"></div>
          <div class="col-12"><input type="text" class="form-control form-control-sm r-iss" placeholder="Issue/Kendala"></div>
          <div class="col-12"><div class="form-check form-switch"><input class="form-check-input r-c" type="checkbox"> <label class="small fw-bold">Done</label></div></div>
        </div>
      </div>`;
    });
    document.getElementById('reportContainer').innerHTML = h;
    nav('pageReport');
  }

  async function finalReport() {
    let reports = [];
    document.querySelectorAll('#reportContainer > div').forEach(div => {
      reports.push({
        row: div.dataset.row, startTime: div.querySelector('.r-start').value, endTime: div.querySelector('.r-end').value,
        output: div.querySelector('.r-out').value, issue: div.querySelector('.r-iss').value, completed: div.querySelector('.r-c').checked
      });
    });
    loader('Submitting...');
    const res = await callAPI({ 
      action: 'submitReport', 
      data: { reports: JSON.stringify(reports), note: document.getElementById('genNote').value } 
    });
    Swal.fire('Great!', res.message, 'success'); 
    nav('pageMenu');
  }

function togglePassword() {
  const input = document.getElementById('p');
  const icon = document.querySelector('.toggle-password i');

  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye-slash-fill';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye-fill';
  }
}

function updateDateTime() {
  const now = new Date();

  const dateOptions = {
    weekday: 'long',
    day: '2-digit',
    month: 'long',
    year: 'numeric'
  };

  const currentDate = now.toLocaleDateString('id-ID', dateOptions);

  const currentTime = now.toLocaleTimeString('id-ID', {
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  });

  document.getElementById('currentDate').innerText = currentDate;
  document.getElementById('liveClock').innerText = currentTime;
}

updateDateTime();
setInterval(updateDateTime, 1000);

function removeTask(button) {
  const totalTask = document.querySelectorAll('.task-row').length;

  // Minimal 1 field tersisa
  if (totalTask <= 1) {
    Swal.fire(
      'Oops!',
      'Minimal harus ada 1 task.',
      'warning'
    );
    return;
  }

  button.closest('.task-row').remove();
}
  
</script>

  
</body>
</html>
