  // GANTI DENGAN URL WEB APP ANDA DARI GOOGLE DEPLOYMENT
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPG28D4-B00eyQLpHaLUPwym46GEWsq42hKOkAR0g3zoI208SbioiBBk6od8803tgOxw/exec"; //UBAH URL
  let user = "";

  // Fungsi helper untuk hit API
  async function callAPI(payload) {
    const response = await fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    return await response.json();
  }

  async function doLogin() {
    const u = document.getElementById('u').value;
    const p = document.getElementById('p').value;
    if(!u || !p) return Swal.fire('Oops!', 'Lengkapi kredensial login terlebih dahulu.', 'warning');

    const res = await callAPI({ action: 'checkLogin', u, p });
    Swal.close();
    if(res.success) { 
      user = res.username;
document.getElementById('userLabel').innerText = res.name;
      nav('pageMenu');

      Swal.fire('Login Gagal', 'Username atau password yang dimasukkan salah.', 'error');
    }
  }

  const p = await callAPI({ action: 'getUserProfile', username: user });

  document.getElementById('disName').value = user;

  async function submitPlan() {
    let tasks = [];
    document.querySelectorAll('.tn').forEach((el, i) => {
      if(el.value) tasks.push({ name: el.value, target: document.querySelectorAll('.tt')[i].value });
    });
    if(tasks.length === 0) return Swal.fire('Oops!', 'Setidaknya harus ada 1 tugas.', 'warning');
    
    loader('Sedang menyimpan task...');
    const data = {
      name: user, position: document.getElementById('disPos').value, division: document.getElementById('disDiv').value,
      clockIn: document.getElementById('clockIn').value, date: new Date().toLocaleDateString('sv-SE'),
      tasks: JSON.stringify(tasks)
    };
    const res = await callAPI({ action: 'savePlan', data });
    Swal.fire('Success', res.message, 'success'); 
    nav('pageMenu');
  }

async function finalReport() {

  // =========================
  // CONFIG FIELD RULES
  // =========================
  const fieldRules = {
    startTime: true,   // true = wajib
    endTime: true,
    output: true,
    issue: false,
    completed: true
  };

  // =========================
  // VALIDATION HELPER
  // =========================
  const isValid = (key, value) => {
    if (!fieldRules[key]) return true; // kalau false = tidak wajib

    if (typeof value === "boolean") return value === true;
    return value !== null && value !== undefined && value !== "";
  };

  let reports = [];
  let isAllValid = true;

  const reportItems = document.querySelectorAll('.report-item');

  reportItems.forEach(div => {

    const data = {
      startTime: div.querySelector('.r-start').value,
      endTime: div.querySelector('.r-end').value,
      output: div.querySelector('.r-out').value,
      issue: div.querySelector('.r-iss').value,
      completed: div.querySelector('.r-c').checked
    };

    // =========================
    // VALIDATION CHECK
    // =========================
    const invalid = Object.keys(fieldRules).some(key => {
      return !isValid(key, data[key]);
    });

    if (invalid) {
      isAllValid = false;
      div.style.border = "1px solid #ff4d4d";
    } else {
      div.style.border = "none";
      div.style.borderLeft = "5px solid #f5c451";
    }

    reports.push({
      row: div.dataset.row,
      ...data
    });
  });

  // =========================
  // ERROR HANDLING
  // =========================
  if (!isAllValid) {
    return Swal.fire(
      'Oops!',
      'Mohon lengkapi semua field wajib sebelum mengirim report.',
      'warning'
    );
  }

  // =========================
  // SEND DATA
  // =========================
  loader('Mengirim Report...');

  const res = await callAPI({
    action: 'submitReport',
    data: {
      reports: JSON.stringify(reports),
      note: document.getElementById('genNote').value
    }
  });

  Swal.fire('Berhasil', res.message, 'success');
  nav('pageMenu');
}

function togglePassword() {
  const input = document.getElementById('p');
  const icon = document.querySelector('.toggle-password i');

  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye-slash-fill';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye-fill';
  }
}

function updateDateTime() {
  const now = new Date();

  const dateOptions = {
    weekday: 'long',
    day: '2-digit',
    month: 'long',
    year: 'numeric'
  };

  const currentDate = now.toLocaleDateString('id-ID', dateOptions);

  const currentTime = now.toLocaleTimeString('id-ID', {
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  });

  document.getElementById('currentDate').innerText = currentDate;
  document.getElementById('liveClock').innerText = currentTime;
}

updateDateTime();
setInterval(updateDateTime, 1000);

function removeTask(button) {
  const totalTask = document.querySelectorAll('.task-row').length;

  // Minimal 1 field tersisa
  if (totalTask <= 1) {
    Swal.fire(
      'Oops!',
      'Minimal harus ada 1 task.',
      'warning'
    );
    return;
  }

  button.closest('.task-row').remove();
}

  function nav(id) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
    p.style.display = "none";
  });

  const active = document.getElementById(id);
  active.classList.add('active');
  active.style.display = "flex";
}

function confirmExit() {
  Swal.fire({
    title: 'Keluar dari aplikasi?',
    text: "Anda akan kembali ke halaman awal.",
    icon: 'warning',
    showCancelButton: true,
    confirmButtonText: 'Ya, keluar',
    cancelButtonText: 'Batal'
  }).then((result) => {
    if (result.isConfirmed) {
      location.reload();
    }
  });
}


  function initTimePicker() {
  document.querySelectorAll(".timepicker").forEach(el => {
    if (el._flatpickr) return;

    flatpickr(el, {
      enableTime: true,
      noCalendar: true,
      dateFormat: "H:i",
      time_24hr: true,
      minuteIncrement: 5,
      disableMobile: true
    });
  });
}
