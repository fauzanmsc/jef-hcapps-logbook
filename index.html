<!DOCTYPE html>
<html>
<head>
  <base target="_top">

  <!-- Primary Meta Tags -->
  <title>JEF WEB APPS - Daily Log Book</title>
  <meta name="title" content="JEF WEB APPS - Daily Log Book">
  <meta name="description" content="Aplikasi Daily Log Book Internal JEF untuk pencatatan aktivitas, task management, dan reporting harian karyawan.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="JEF WEB APPS - Daily Log Book">
  <meta property="og:description" content="Platform Daily Log Book Internal JEF untuk monitoring aktivitas dan reporting harian.">
  <meta property="og:image" content="/thumbnail.png">
  <meta property="og:url" content="https://jef-hcapps-dailylogbook.vercel.app/">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="JEF WEB APPS - Daily Log Book">
  <meta name="twitter:description" content="Platform Daily Log Book Internal JEF untuk monitoring aktivitas dan reporting harian.">
  <meta name="twitter:image" content="/jef-logomark.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/jef-icons.png">
  <link rel="apple-touch-icon" href="/jef-icons.png">

  <!-- Theme -->
  <meta name="theme-color" content="#1a1a1a">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root { --bento-bg: #f8f9fa; --card-radius: 24px; --jef-dark: #1a1a1a; }
    body { background: var(--bento-bg); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
    .app-shell { width: 100%; max-width: 480px; animation: fadeIn 0.6s ease; }
    .page { display: none; }
    .active { display: block; }
    
    /* Bento Card Style */
    .bento-card { background: white; border-radius: var(--card-radius); padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); margin-bottom: 20px; }
    .bento-header { background: var(--jef-dark); color: white; border-radius: var(--card-radius); padding: 30px; margin-bottom: 20px; text-align: center; }
    
    .btn-jef { background: var(--jef-dark); color: white; border-radius: 16px; padding: 14px; border: none; font-weight: 600; width: 100%; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .btn-jef:hover { transform: scale(1.02); background: #333; }
    
    .menu-item { background: white; border-radius: 22px; padding: 25px; text-align: center; transition: 0.3s; cursor: pointer; border: 1px solid transparent; height: 100%; }
    .menu-item:hover { border-color: var(--jef-dark); transform: translateY(-5px); }
    .menu-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }

    .form-control, .form-select { border-radius: 12px; padding: 12px; border: 1px solid #eee; background: #fafafa; }
    .form-control:focus { box-shadow: none; border-color: var(--jef-dark); background: white; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="app-shell">
  
  <div id="pageLogin" class="page active">
    <div class="bento-header shadow-lg text-center">
  <img 
    src="/jef-logomark.png" 
    alt="JEF Logo"
    class="mb-2"
    style="max-width: 80px; height: auto;"
  >

  <h3 class="fw-bold mb-0">JEF WEB APPS</h3>
  <small class="opacity-50">Daily Log Book v1.0</small>
</div>
    <div class="bento-card">
      <div class="mb-3">
        <label class="small fw-bold text-muted mb-2 d-block">Masukkan Username</label>
        <input type="text" id="u" class="form-control" placeholder="Username">
      </div>
      <div class="mb-4">
        <label class="small fw-bold text-muted mb-2 d-block">Masukkan Password</label>
        <input type="password" id="p" class="form-control" placeholder="••••••••">
      </div>
      <button class="btn btn-jef shadow" onclick="doLogin()">Masuk</button>
    </div>
  </div>

  <div id="pageMenu" class="page">
    <div class="mb-4 text-center">
      <h5 class="fw-bold">Selamat Datang,</h5>
      <h4 class="text-primary fw-bold" id="userLabel">User</h4>
    </div>
    <div class="row g-3">
      <div class="col-6">
        <div class="menu-item shadow-sm" onclick="showPlan()">
          <span class="menu-icon">✍️</span>
          <span class="small fw-bold text-dark">Buat Log Book</span>
        </div>
      </div>
      <div class="col-6">
        <div class="menu-item shadow-sm" onclick="showReport()">
          <span class="menu-icon">📊</span>
          <span class="small fw-bold text-dark">Lengkapi Report</span>
        </div>
      </div>
    </div>
    <div class="text-center mt-5">
      <button class="btn btn-link text-danger text-decoration-none small" onclick="location.reload()">Keluar</button>
    </div>
  </div>

  <div id="pagePlan" class="page">
    <div class="bento-card">
      <h6 class="fw-bold mb-4">Buat Daftar Log Book Hari Ini</h6>
      <div class="row g-2 mb-4">
        <div class="col-12"><input type="text" id="disName" class="form-control bg-light mb-2" readonly></div>
        <div class="col-6"><input type="text" id="disPos" class="form-control bg-light" readonly></div>
        <div class="col-6"><input type="text" id="disDiv" class="form-control bg-light" readonly></div>
        <div class="col-12 mt-2"><label class="small fw-bold mb-1">Kamu Datang Jam Berapa Hari Ini ?</label><input type="time" id="clockIn" class="form-control"></div>
      </div>
      <div id="planContainer">
        <div class="input-group mb-2 shadow-sm rounded-3 overflow-hidden">
          <input type="text" class="form-control border-0 tn" placeholder="Isi task / activity">
          <input type="text" class="form-control border-0 tt" placeholder="Isi target dari task">
        </div>
      </div>
      <button class="btn btn-sm btn-outline-dark border-0 fw-bold mt-2" onclick="addPlanField()">+ Tambahkan Task</button>
      <button class="btn btn-jef mt-4" onclick="submitPlan()">Buat Log Book</button>
      <button class="btn btn-link w-100 text-muted btn-sm mt-2" onclick="nav('pageMenu')">Kembali ke Menu</button>
    </div>
  </div>

  <div id="pageReport" class="page">
    <div class="bento-card p-0 overflow-hidden">
      <div class="p-4 border-bottom bg-primary text-white">
        <h6 class="mb-0 fw-bold">Progress Report</h6>
      </div>
      <div class="p-4" style="max-height: 450px; overflow-y: auto;">
        <div id="reportContainer"></div>
        <textarea id="genNote" class="form-control mt-3" placeholder="Catatan tambahan..."></textarea>
      </div>
      <div class="p-4 border-top bg-light">
        <button class="btn btn-success w-100 fw-bold p-3 rounded-4" onclick="finalReport()">SUBMIT REPORT</button>
        <button class="btn btn-link w-100 text-muted btn-sm mt-2" onclick="nav('pageMenu')">CANCEL</button>
      </div>
    </div>
  </div>

</div>

<!-- Bagian HTML & CSS tetap sama seperti milik Anda -->

<script>
  // GANTI DENGAN URL WEB APP ANDA DARI GOOGLE DEPLOYMENT
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwt-H0dKaoaKnItBSuyKw44sLGJNxUxNenFEhlJYPju1U8o77PmPZwRcjCsdgfQCkQjEQ/exec";
  let user = "";

  // Fungsi helper untuk hit API
  async function callAPI(payload) {
    const response = await fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    return await response.json();
  }

  function nav(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function loader(text = 'Loading...') {
    Swal.fire({ title: text, allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  }

  async function doLogin() {
    const u = document.getElementById('u').value;
    const p = document.getElementById('p').value;
    if(!u || !p) return Swal.fire('Oops!', 'Lengkapi kredensial login terlebih dahulu.', 'warning');
    
    loader('Proses Autentifikasi...');
    const res = await callAPI({ action: 'checkLogin', u, p });
    Swal.close();
    if(res.success) { 
      user = res.name; 
      document.getElementById('userLabel').innerText = user; 
      nav('pageMenu'); 
    } else { 
      Swal.fire('Error', 'Wrong Password/Username', 'error'); 
    }
  }

  async function showPlan() {
    loader('Memuat profil...');
    const p = await callAPI({ action: 'getUserProfile', username: user });
    Swal.close();
    document.getElementById('disName').value = user;
    document.getElementById('disPos').value = p.position;
    document.getElementById('disDiv').value = p.division;
    document.getElementById('clockIn').value = new Date().toTimeString().slice(0,5);
    nav('pagePlan');
  }

  function addPlanField() {
    const html = `<div class="input-group mb-2 shadow-sm rounded-3 overflow-hidden animate__animated animate__fadeInUp"><input type="text" class="form-control border-0 tn" placeholder="Tugas"><input type="text" class="form-control border-0 tt" placeholder="Target"></div>`;
    document.getElementById('planContainer').insertAdjacentHTML('beforeend', html);
  }

  async function submitPlan() {
    let tasks = [];
    document.querySelectorAll('.tn').forEach((el, i) => {
      if(el.value) tasks.push({ name: el.value, target: document.querySelectorAll('.tt')[i].value });
    });
    if(tasks.length === 0) return Swal.fire('Oops!', 'Setidaknya harus ada 1 tugas.', 'warning');
    
    loader('Sedang menyimpan task...');
    const data = {
      name: user, position: document.getElementById('disPos').value, division: document.getElementById('disDiv').value,
      clockIn: document.getElementById('clockIn').value, date: new Date().toISOString().split('T')[0],
      tasks: JSON.stringify(tasks)
    };
    const res = await callAPI({ action: 'savePlan', data });
    Swal.fire('Success', res.message, 'success'); 
    nav('pageMenu');
  }

  async function showReport() {
    loader('Sedang menyinkronkan data...');
    const tasks = await callAPI({ action: 'getActiveTasks', username: user });
    Swal.close();
    if(tasks.length === 0) return Swal.fire('Info', 'Tidak ada task aktif untuk hari ini.', 'info');
    let h = '';
    tasks.forEach(t => {
      h += `<div class="bento-card mb-3 bg-light" data-row="${t.row}" style="padding: 15px; border-radius: 16px;">
        <p class="mb-2 fw-bold text-dark small">${t.task}</p>
        <div class="row g-2">
          <div class="col-6"><input type="time" class="form-control form-control-sm r-start"></div>
          <div class="col-6"><input type="time" class="form-control form-control-sm r-end"></div>
          <div class="col-12"><input type="text" class="form-control form-control-sm r-out" placeholder="Output Result"></div>
          <div class="col-12"><input type="text" class="form-control form-control-sm r-iss" placeholder="Issue/Kendala"></div>
          <div class="col-12"><div class="form-check form-switch"><input class="form-check-input r-c" type="checkbox"> <label class="small fw-bold">Done</label></div></div>
        </div>
      </div>`;
    });
    document.getElementById('reportContainer').innerHTML = h;
    nav('pageReport');
  }

  async function finalReport() {
    let reports = [];
    document.querySelectorAll('#reportContainer > div').forEach(div => {
      reports.push({
        row: div.dataset.row, startTime: div.querySelector('.r-start').value, endTime: div.querySelector('.r-end').value,
        output: div.querySelector('.r-out').value, issue: div.querySelector('.r-iss').value, completed: div.querySelector('.r-c').checked
      });
    });
    loader('Submitting...');
    const res = await callAPI({ 
      action: 'submitReport', 
      data: { reports: JSON.stringify(reports), note: document.getElementById('genNote').value } 
    });
    Swal.fire('Great!', res.message, 'success'); 
    nav('pageMenu');
  }
</script>

</body>
</html>
